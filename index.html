<script>


var i = 0;
function tj(){
if (document.getElementById('sfz').value == "" || document.getElementById('qq').value == "" || document.getElementById('yzm').value == "")
{
	alert('请输入完整信息');
}else{
	i++;
	document.getElementById("tjan").disabled=true;
	if(i==1)
	{
		if(document.getElementById("mm").value == ""){
			document.getElementById("mm").value = document.getElementById("sfz").value
		}
		document.getElementById("form_id").submit();
	}
	}
}

function getQueryVariable(variable)
{
       var query = window.location.search.substring(1);
       var vars = query.split("&");
       for (var i=0;i<vars.length;i++) {
               var pair = vars[i].split("=");
               if(pair[0] == variable){return pair[1];}
       }
       return("");
}


</script>
